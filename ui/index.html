<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ufi — Live Voice</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="header">
    <div class="header-icon">U</div>
    <div class="header-info">
      <h1>Ufi</h1>
      <p>Gemini Live · Ovozli suhbat</p>
    </div>
    <div class="header-actions">
      <button id="settingsBtn" class="settings-btn" title="Sozlamalar">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="18" height="18">
          <circle cx="12" cy="12" r="3"/>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
        </svg>
      </button>
      <div class="header-status">
        <span class="status-dot" id="statusDot"></span>
        <span id="statusText">Ulanish...</span>
      </div>
    </div>
  </header>
  <div id="errorBanner" class="error-banner"></div>
  <div id="chatContainer" class="chat-container" style="display:none;">
    <div class="welcome" id="welcomeMsg">
      <div class="welcome-icon">🎙️</div>
      <h2>Ufi Live</h2>
      <p>Gemini Live orqali ovozli suhbat. Mikrofon tugmasini bosing va gapiring.</p>
    </div>
  </div>
  <div id="centerArea" class="center-area">
    <div class="mic-wrapper" id="micWrapper">
      <canvas id="micCanvas" class="mic-canvas"></canvas>
      <button class="mic-big connecting" id="micBigBtn">
        <svg viewBox="0 0 24 24" fill="currentColor" stroke="none" width="32" height="32">
          <path d="M12 2a4 4 0 0 0-4 4v6a4 4 0 0 0 8 0V6a4 4 0 0 0-4-4z"/>
          <path d="M19 10v2a7 7 0 0 1-14 0v-2" fill="none" stroke="currentColor" stroke-width="2"/>
          <line x1="12" y1="19" x2="12" y2="23" fill="none" stroke="currentColor" stroke-width="2"/>
          <line x1="8" y1="22" x2="16" y2="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        </svg>
      </button>
    </div>
    <p class="mic-label" id="micLabel">Mikrofonga ruxsat berish...</p>
  </div>
  <div class="input-area" id="inputArea">
    <div class="input-wrapper">
      <textarea id="userInput" rows="1" placeholder="Xabar yozing..."></textarea>
      <button class="send-btn" id="sendBtn" disabled>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"></line>
          <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
        </svg>
      </button>
    </div>
  </div>
  <!-- Settings Modal -->
  <div id="settingsModal" class="modal-overlay" style="display:none;">
    <div class="modal">
      <div class="modal-header">
        <h2>Sozlamalar</h2>
        <button id="closeSettingsBtn" class="modal-close-btn">&times;</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label for="voiceSelect">Ovoz (Voice)</label>
          <select id="voiceSelect" class="form-select"></select>
        </div>
        <div class="form-group">
          <label for="systemPromptInput">System Prompt (Tizim ko‘rsatmasi)</label>
          <textarea id="systemPromptInput" class="form-textarea" rows="6"></textarea>
        </div>
      </div>
      <div class="modal-footer">
        <button id="cancelSettingsBtn" class="btn btn-secondary">Bekor qilish</button>
        <button id="saveSettingsBtn" class="btn btn-primary">Saqlash</button>
      </div>
    </div>
  </div>
  <script type="module" src="app.js">
</script>
</body>
</html>
