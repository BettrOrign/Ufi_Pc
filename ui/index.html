<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ufi — Live Voice</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="header">
    <div class="header-icon">U</div>
    <div class="header-info">
      <h1>Ufi</h1>
      <p>Gemini Live · Ovozli suhbat</p>
    </div>
    <div class="header-actions">
      <div id="screenShareBadge" class="screen-share-badge" style="display:none;">
        <svg viewBox="0 0 24 24" width="14" height="14" fill="currentColor" stroke="none"><rect x="2" y="3" width="20" height="14" rx="2" ry="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
        Screen
      </div>
      <button id="settingsBtn" class="settings-btn" title="Sozlamalar">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="18" height="18">
          <circle cx="12" cy="12" r="3"/>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
        </svg>
      </button>
      <div class="header-status">
        <span class="status-dot" id="statusDot"></span>
        <span id="statusText">Ulanish...</span>
      </div>
    </div>
  </header>
  <div id="errorBanner" class="error-banner"></div>
  <div id="chatContainer" class="chat-container" style="display:none;">
    <div class="welcome" id="welcomeMsg">
      <div class="welcome-icon">🎙️</div>
      <h2>Ufi Live</h2>
      <p>Gemini Live orqali ovozli suhbat. Mikrofon tugmasini bosing va gapiring.</p>
    </div>
  </div>
  <div id="centerArea" class="center-area">
    <div class="nucleus-wrapper" id="nucleusWrapper">
      <canvas id="nucleusCanvas" class="nucleus-canvas"></canvas>
      <button id="micBigBtn" style="display:none" aria-label="Gapirish"></button>
    </div>
    <p class="mic-label" id="micLabel">Mikrofonga ruxsat berish...</p>
  </div>
  <div class="input-area" id="inputArea">
    <div class="input-wrapper">
      <textarea id="userInput" rows="1" placeholder="Xabar yozing..."></textarea>
      <button class="send-btn" id="sendBtn" disabled>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"></line>
          <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
        </svg>
      </button>
    </div>
  </div>
  <!-- Settings Modal -->
  <div id="settingsModal" class="modal-overlay" style="display:none;">
    <div class="modal">
      <div class="modal-header">
        <h2>Sozlamalar</h2>
        <button id="closeSettingsBtn" class="modal-close-btn">&times;</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label for="voiceSelect">Ovoz (Voice)</label>
          <select id="voiceSelect" class="form-select"></select>
        </div>
        <div class="form-group">
          <label for="systemPromptInput">System Prompt (Tizim ko'rsatmasi)</label>
          <textarea id="systemPromptInput" class="form-textarea" rows="6"></textarea>
        </div>
        <hr class="settings-divider">
        <div class="settings-section">
          <h3 class="settings-section-title">🎨 Core Theme</h3>
          <div class="theme-grid" id="themeGrid">
            <button class="theme-btn" data-theme="nebula" style="--tc:#7c5cfc">Purple</button>
            <button class="theme-btn" data-theme="solar" style="--tc:#f59e0b">Solar</button>
            <button class="theme-btn" data-theme="aurora" style="--tc:#22d3ee">Aurora</button>
            <button class="theme-btn" data-theme="neon" style="--tc:#ec4899">Neon</button>
            <button class="theme-btn" data-theme="ocean" style="--tc:#3b82f6">Ocean</button>
          </div>
        </div>
        <div class="settings-section">
          <h3 class="settings-section-title">⚙️ Core Controls</h3>
          <div class="form-group">
            <div class="range-group">
              <label>Rotation Speed</label>
              <span class="range-val" id="speedDisp">1.0</span>
            </div>
            <input type="range" id="coreSpeed" min="0.2" max="3.0" step="0.1" value="1.0">
          </div>
          <div class="form-group">
            <div class="range-group">
              <label>Mic Sensitivity</label>
              <span class="range-val" id="sensDisp">1.0</span>
            </div>
            <input type="range" id="coreSensitivity" min="0.2" max="3.0" step="0.1" value="1.0">
          </div>
          <div class="form-group">
            <div class="range-group">
              <label>Hue Shift</label>
              <span class="range-val" id="hueDisp">0</span>
            </div>
            <input type="range" id="coreHue" min="-60" max="60" step="5" value="0">
          </div>
        </div>
      </div>
      </div>
      <div class="modal-footer">
        <button id="cancelSettingsBtn" class="btn btn-secondary">Bekor qilish</button>
        <button id="saveSettingsBtn" class="btn btn-primary">Saqlash</button>
      </div>
    </div>
  </div>
  <script type="module" src="app.js">
</script>
</body>
</html>
